<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Shopping</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="theme-color" content="#1a1a1a">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #111;
    --muted: #888;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px 64px;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  header { margin-bottom: 48px; }
  header h1 {
    font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  header p {
    font-size: 32px; font-weight: 300; letter-spacing: -0.03em; line-height: 1.1;
  }

  .tools { display: flex; flex-direction: column; gap: 12px; margin-bottom: 48px; }

  .tool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .tool-card:hover {
    border-color: #bbb;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .tool-card:active { opacity: 0.85; }

  .tool-info { flex: 1; }
  .tool-name { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
  .tool-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .tool-arrow {
    font-size: 18px; color: var(--muted); margin-left: 16px; flex-shrink: 0;
    transition: transform 0.15s;
  }
  .tool-card:hover .tool-arrow { transform: translateX(3px); }

  footer {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.06em; text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <h1>Auto Shopping</h1>
  <p>Your deal,<br>by the numbers.</p>
</header>

<div class="tools">
  <a class="tool-card" href="auto-loan/">
    <div class="tool-info">
      <div class="tool-name">Auto Loan</div>
      <div class="tool-desc">VIN decode · Negotiation analytics · VehicleVantage vs conventional</div>
    </div>
    <div class="tool-arrow">→</div>
  </a>
  <a class="tool-card" href="lease/">
    <div class="tool-info">
      <div class="tool-name">Lease</div>
      <div class="tool-desc">Money factor · Residual · 1% rule · Dealer markup detection</div>
    </div>
    <div class="tool-arrow">→</div>
  </a>
</div>

<footer>Personal use only</footer>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/auto-shopping/sw.js').catch(() => {});
}
</script>
</body>
</html>
